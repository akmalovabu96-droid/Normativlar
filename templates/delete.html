{% extends 'base.html' %}

{% block content %}

<div class="card shadow">

<div class="card-body">

<h3>Delete Post</h3>

<p>Are you sure?</p>

<form method="post">

    {% csrf_token %}

    <button class="btn btn-danger">
        Yes Delete
    </button>

    <a href="{% url 'post_list' %}" class="btn btn-secondary">
        Cancel
    </a>

</form>

</div>

</div>

{% endblock %}
