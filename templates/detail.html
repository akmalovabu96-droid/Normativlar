{% extends 'base.html' %}

{% block content %}

<div class="card shadow">

    <div class="card-body">

        <h2>{{ post.title }}</h2>

        <p>{{ post.content }}</p>

        {% if user.is_authenticated %}
            <a href="{% url 'post_update' post.pk %}" class="btn btn-warning">
                Tahrirlash
            </a>
        {% endif %}

        <a href="{% url 'post_list' %}" class="btn btn-secondary">
            Orqaga
        </a>

    </div>

</div>

{% endblock %}
