{% extends 'base.html' %}

{% block content %}

<div class="card shadow">

    <div class="card-body">

        <h2>{{ post.title }}</h2>

        {% if post.image %}
<img src="{{ post.image.url }}" class="img-fluid mb-3">
        {% endif %}

        <p>{{ post.content }}</p>

        {% if perms.posting.change_post %}
            <a href="{% url 'post_update' post.pk %}" class="btn btn-warning">
                Tahrirlash
            </a>
        {% endif %}

        <a href="{% url 'post_list' %}" class="btn btn-secondary">
            Orqaga
        </a>

    </div>

</div>

{% endblock %}
