<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Post Ilovasi</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="{% url 'post_list' %}">
            📝 Mening Blogim
        </a>

        <form method="get" action="{% url 'post_list' %}" class="d-flex ms-auto me-2">

<input
class="form-control me-2"
type="search"
name="q"
placeholder="Qidiruv"
value="{{ request.GET.q }}"
>

            {% if user.is_authenticated %}

<a href="{% url 'logout' %}" class="btn btn-secondary">
Chiqish
</a>

            {% else %}

<a href="{% url 'login' %}" class="btn btn-outline-info">
    Login
</a>

<a href="{% url 'register' %}" class="btn btn-outline-light ms-2">
    Ro'yxatdan o'tish
</a>

{% endif %}

</form>

    {% if perms.posting.add_post %}
        <a href="{% url 'post_create' %}" class="btn btn-success">
            + Post Yaratish
        </a>
    {% endif %}


    </div>
</nav>


<div class="container mt-4">

    {% block content %}

    {% endblock %}

</div>

</body>
</html>
