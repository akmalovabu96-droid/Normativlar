<!-- Barcha postlar -->

<!DOCTYPE html>
<html lang="uz">
<head>
    <title>All Posts</title>
</head>
<body>

<h1>Barcha Postlar</h1>

<a href="{% url 'post_create' %}">➕ Yangi post yaratish</a>
<hr>

{% for post in posts %}
    <h2>
        <a href="{% url 'post_detail' post.pk %}">
            {{ post.title }}
        </a>
    </h2>

    <a href="{% url 'post_update' post.pk %}">✏ Tahrirlash</a>
    |
    <a href="{% url 'post_delete' post.pk %}">🗑 O'chirish</a>

    <hr>
{% empty %}
    <p>Hozircha bu yer bo'sh.</p>
{% endfor %}

</body>
</html>
